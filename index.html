<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Procedural Racer — every race a new world</title>
<style>
  :root { --fg:#e9f1ff; --accent:#5cdb95; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#0a0d14; color:var(--fg);
    font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden;
    touch-action:none; overscroll-behavior:none; }
  #wrap { position:relative; width:100vw; height:100vh; }
  canvas { display:block; width:100%; height:100%; }

  /* ---- HUD ---- */
  .hud { position:absolute; pointer-events:none; text-shadow:0 1px 4px #000a; }
  #topleft { top:14px; left:16px; font-size:14px; line-height:1.5; }
  #topleft b { color:var(--accent); }
  #topright { top:14px; right:16px; text-align:right; font-size:14px; line-height:1.5; }

  #speedo { position:absolute; bottom:18px; right:20px; text-align:right;
    pointer-events:none; text-shadow:0 1px 4px #000a; }
  #speedo .kmh { font-size:46px; font-weight:700; line-height:1; }
  #speedo .unit { font-size:14px; opacity:.7; }
  #gearbar { width:180px; height:8px; background:#ffffff22; border-radius:4px;
    margin-top:8px; overflow:hidden; }
  #gearfill { height:100%; width:0%; background:linear-gradient(90deg,#5cdb95,#ffd23f,#ff5b5b);
    transition:width .08s linear; }

  /* ---- minimap ---- */
  #mini { position:absolute; bottom:18px; left:18px; width:160px; height:160px;
    background:#00000055; border:1px solid #ffffff22; border-radius:10px; }

  /* ---- controls panel ---- */
  #panel { position:absolute; top:14px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center; }
  #panel button { pointer-events:auto; cursor:pointer; border:none; border-radius:8px;
    padding:8px 14px; font-size:13px; font-weight:600; background:#1b2436; color:var(--fg);
    border:1px solid #ffffff1a; transition:.15s; }
  #panel button:hover { background:#27344d; }
  #panel button.primary { background:var(--accent); color:#06210f; }
  #seedbox { pointer-events:auto; background:#1b2436; border:1px solid #ffffff1a;
    border-radius:8px; padding:7px 10px; color:var(--fg); font-size:13px; width:120px; }

  #help { position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    font-size:13px; opacity:.65; pointer-events:none; text-align:center; }
  kbd { background:#ffffff1a; border:1px solid #ffffff33; border-bottom-width:2px;
    border-radius:5px; padding:1px 6px; font-family:inherit; font-size:12px; }

  #toast { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:42px; font-weight:800; letter-spacing:1px; opacity:0; transition:opacity .3s;
    text-shadow:0 2px 16px #000c; pointer-events:none; text-align:center; }

  /* ---- touch controls (hidden unless .touch on body) ---- */
  #touch { display:none; }
  body.touch #touch { display:block; }
  body.touch #help { display:none; }
  .tbtn { position:absolute; pointer-events:auto; user-select:none; -webkit-user-select:none;
    touch-action:none; -webkit-tap-highlight-color:transparent;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%; background:#1b2436cc; border:2px solid #ffffff26; color:var(--fg);
    font-size:30px; font-weight:700; backdrop-filter:blur(2px); }
  .tbtn.active { background:var(--accent); color:#06210f; border-color:var(--accent); }
  .tbtn.wide { border-radius:18px; }
  #t-left  { width:78px; height:78px; bottom:96px; left:24px; }
  #t-right { width:78px; height:78px; bottom:96px; left:118px; }
  #t-gas   { width:94px; height:94px; bottom:96px; right:24px; background:#1e5c39cc; }
  #t-brake { width:78px; height:78px; bottom:104px; right:130px; background:#5c1e1ecc; }
  #t-hand  { width:120px; height:46px; bottom:30px; right:24px; font-size:15px; }
  body.touch #speedo { bottom:auto; top:64px; }
  body.touch #mini { bottom:auto; top:120px; left:18px; width:120px; height:120px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="panel">
    <input id="seedbox" placeholder="seed (optional)" />
    <button id="newRace" class="primary">↻ New Race</button>
    <button id="reset">⟲ Restart</button>
  </div>

  <div class="hud" id="topleft">
    Biome: <b id="biome">—</b><br>
    Seed: <b id="seedval">—</b><br>
    Lap: <b id="lap">0 / 3</b>
  </div>
  <div class="hud" id="topright">
    Time: <b id="time">0.00</b><br>
    Last lap: <b id="last">—</b><br>
    Best lap: <b id="best">—</b>
  </div>

  <div id="speedo">
    <div><span class="kmh" id="kmh">0</span> <span class="unit">km/h</span></div>
    <div id="gearbar"><div id="gearfill"></div></div>
  </div>

  <canvas id="mini" width="160" height="160"></canvas>

  <div id="help">
    <kbd>W</kbd>/<kbd>↑</kbd> throttle &nbsp; <kbd>S</kbd>/<kbd>↓</kbd> brake/reverse &nbsp;
    <kbd>A</kbd><kbd>D</kbd>/<kbd>←</kbd><kbd>→</kbd> steer &nbsp; <kbd>Space</kbd> handbrake
  </div>

  <div id="toast"></div>

  <div id="touch">
    <div class="tbtn" id="t-left">‹</div>
    <div class="tbtn" id="t-right">›</div>
    <div class="tbtn" id="t-brake">⟂</div>
    <div class="tbtn" id="t-gas">▲</div>
    <div class="tbtn wide" id="t-hand">DRIFT</div>
  </div>
</div>

<script>
/* =============================================================================
   PROCEDURAL RACER
   Two systems combined:
     1. PROCEDURAL GENERATION  — seeded RNG builds a unique closed-loop race
        track (random hull -> spline smoothing) plus a biome + scattered scenery,
        so every race is a different world.
     2. VEHICLE PHYSICS        — a top-down car model with engine force, drag,
        steering tied to speed, and a tire-grip model that separates forward vs.
        lateral velocity to produce real understeer / oversteer / drift.
   ============================================================================= */

// ---------- seeded RNG (mulberry32) ----------
function makeRNG(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s) { // string -> 32-bit seed
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

// ---------- vector helpers ----------
const TAU = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
function dist(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return Math.hypot(dx, dy); }

// =============================================================================
//  PROCEDURAL TRACK GENERATION
// =============================================================================
const BIOMES = {
  meadow: { grass:'#243b1e', grass2:'#2c4724', road:'#3a3f47', edge:'#cfd6df',
            fog:'#0a0d14', sky:'#1a2a16', prop:'tree',  propColor:'#3e6b32', accent:'#6cc24a' },
  desert: { grass:'#7a5c33', grass2:'#8a6a3b', road:'#4a4640', edge:'#e7d9b5',
            fog:'#1a140c', sky:'#2a2010', prop:'cactus', propColor:'#4e7c3a', accent:'#e0a93f' },
  snow:   { grass:'#cdd6e0', grass2:'#dbe3ec', road:'#41454d', edge:'#ffffff',
            fog:'#0e1118', sky:'#2c3340', prop:'pine',   propColor:'#2c4a30', accent:'#7fb6ff' },
  night:  { grass:'#11161f', grass2:'#161c28', road:'#2a2f3a', edge:'#5cdb95',
            fog:'#04060a', sky:'#0a1020', prop:'tree',   propColor:'#1c3326', accent:'#5cdb95' },
};

// Build a smooth, non-self-intersecting closed track centreline from a seed.
function generateTrack(rng) {
  const POINTS = 11 + Math.floor(rng() * 5);   // control points around the loop
  const R = 1100;                              // base radius (world units)
  const pts = [];
  for (let i = 0; i < POINTS; i++) {
    const a = (i / POINTS) * TAU;
    // vary radius per point -> wobbly loop; clamp so it never gets too pinched
    const rad = R * (0.55 + rng() * 0.55);
    pts.push({ x: Math.cos(a) * rad, y: Math.sin(a) * rad });
  }
  // Relax: push points so consecutive ones aren't too close (avoids kinks)
  for (let pass = 0; pass < 3; pass++) {
    for (let i = 0; i < pts.length; i++) {
      const n = pts[(i + 1) % pts.length];
      const dx = n.x - pts[i].x, dy = n.y - pts[i].y;
      const d = Math.hypot(dx, dy) || 1;
      const minD = 420;
      if (d < minD) {
        const push = (minD - d) * 0.5;
        pts[i].x -= dx / d * push; pts[i].y -= dy / d * push;
        n.x += dx / d * push;      n.y += dy / d * push;
      }
    }
  }
  // Catmull-Rom spline through the control points -> dense smooth centreline
  const center = [];
  const SEG = 24;
  for (let i = 0; i < pts.length; i++) {
    const p0 = pts[(i - 1 + pts.length) % pts.length];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % pts.length];
    const p3 = pts[(i + 2) % pts.length];
    for (let s = 0; s < SEG; s++) {
      const t = s / SEG, t2 = t * t, t3 = t2 * t;
      const x = 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
      const y = 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3);
      center.push({ x, y });
    }
  }
  // cumulative length + tangents/normals for each centreline node
  let total = 0;
  for (let i = 0; i < center.length; i++) {
    const a = center[i], b = center[(i + 1) % center.length];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy) || 1;
    a.tx = dx / len; a.ty = dy / len;       // tangent
    a.nx = -a.ty;    a.ny = a.tx;            // left normal
    a.s = total; total += len;
  }
  const width = 120 + rng() * 50;            // half-width of asphalt varies per track
  return { center, width, length: total };
}

// Scatter scenery props in the grass, avoiding the road.
function generateProps(rng, track, biome) {
  const props = [];
  const tries = 900;
  for (let i = 0; i < tries; i++) {
    const ang = rng() * TAU;
    const rad = 200 + rng() * 1500;
    const x = Math.cos(ang) * rad, y = Math.sin(ang) * rad;
    // reject if too close to the road
    let near = Infinity;
    for (let j = 0; j < track.center.length; j += 3) {
      const d = dist(x, y, track.center[j].x, track.center[j].y);
      if (d < near) near = d;
    }
    if (near < track.width + 55) continue;     // keep clear of asphalt
    if (near > 900) continue;                  // don't scatter into far void
    props.push({ x, y, r: 14 + rng() * 18, sway: rng() * TAU });
  }
  return props;
}

// =============================================================================
//  THE CAR  (top-down vehicle physics)
// =============================================================================
class Car {
  constructor() { this.reset(0, 0, 0); }
  reset(x, y, angle) {
    this.x = x; this.y = y; this.angle = angle;
    this.vx = 0; this.vy = 0;     // world-space velocity
    this.steer = 0;               // smoothed steering input
    this.skids = [];              // skid-mark trail points
  }
  // controls: throttle (-1..1), steerInput (-1..1), handbrake bool, onTrack bool
  update(dt, throttle, steerInput, handbrake, onTrack) {
    const ENGINE = 1500;          // forward acceleration
    const MAXSPEED = 720;
    const STEER_RATE = 3.4;       // how fast wheels turn

    // --- smooth steering toward input (snappier when slow) ---
    this.steer = lerp(this.steer, steerInput, 1 - Math.pow(0.0015, dt));

    // heading unit vector
    const fx = Math.cos(this.angle), fy = Math.sin(this.angle);

    // signed forward speed
    let forwardSpeed = this.vx * fx + this.vy * fy;

    // --- engine / brake force along heading ---
    let accel = throttle * ENGINE;
    if (throttle < 0 && forwardSpeed > 5) accel = throttle * ENGINE * 1.6; // stronger braking
    this.vx += fx * accel * dt;
    this.vy += fy * accel * dt;

    // --- drag + rolling resistance (more on grass) ---
    const drag = onTrack ? 0.4 : 3.2;           // grass slows you hard
    const roll = onTrack ? 0.015 : 0.05;
    this.vx -= this.vx * (roll + drag * 0.0006) ;
    this.vy -= this.vy * (roll + drag * 0.0006) ;
    // hard speed cap
    const sp = Math.hypot(this.vx, this.vy);
    if (sp > MAXSPEED) { this.vx *= MAXSPEED / sp; this.vy *= MAXSPEED / sp; }

    // --- TIRE GRIP MODEL: split velocity into forward + lateral, ---
    // --- then kill most of the lateral part (that IS tire grip). ---
    forwardSpeed = this.vx * fx + this.vy * fy;
    const fwdX = fx * forwardSpeed, fwdY = fy * forwardSpeed;
    const latX = this.vx - fwdX, latY = this.vy - fwdY;
    // gripKeep = fraction of sideways velocity RETAINED (higher => more slide)
    let gripKeep = onTrack ? 0.12 : 0.45;       // grass is slippery
    if (handbrake) gripKeep = 0.85;             // handbrake -> big drift
    this.vx = fwdX + latX * gripKeep;
    this.vy = fwdY + latY * gripKeep;

    // --- steering rotates heading, scaled by speed & direction ---
    const speedFactor = clamp(Math.abs(forwardSpeed) / 180, 0, 1);
    const turn = this.steer * STEER_RATE * speedFactor * Math.sign(forwardSpeed || 1);
    this.angle += turn * dt;

    // --- integrate position ---
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // --- record skid marks when the tires are sliding sideways ---
    const slip = Math.hypot(latX, latY);
    if ((slip > 90 || handbrake) && sp > 40) {
      this.skids.push({ x: this.x, y: this.y, a: this.angle, life: 1 });
    }
    for (let i = this.skids.length - 1; i >= 0; i--) {
      this.skids[i].life -= dt * 0.18;
      if (this.skids[i].life <= 0) this.skids.splice(i, 1);
    }
    if (this.skids.length > 600) this.skids.splice(0, this.skids.length - 600);

    this.speed = sp;
    this.forwardSpeed = forwardSpeed;
    this.slip = slip;
  }
}

// =============================================================================
//  GAME
// =============================================================================
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const mini = document.getElementById('mini');
const mctx = mini.getContext('2d');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

const TOTAL_LAPS = 3;
let track, props, biomeName, biome, car;
let cam = { x: 0, y: 0, zoom: 0.6 };
let nextCheckpoint = 0, lap = 0, started = false;
let raceTime = 0, lapStart = 0, lastLap = null, bestLap = null;
let checkpoints = [];          // sampled centreline nodes used as gates
const NUM_CP = 20;
let currentSeed = 0;

function buildRace(seed) {
  currentSeed = seed >>> 0;
  const rng = makeRNG(currentSeed);
  // pick biome from seed
  const names = Object.keys(BIOMES);
  biomeName = names[Math.floor(rng() * names.length)];
  biome = BIOMES[biomeName];

  track = generateTrack(rng);
  props = generateProps(rng, track, biome);

  // checkpoints sampled evenly along centreline (index 0 == start/finish)
  checkpoints = [];
  for (let i = 0; i < NUM_CP; i++) {
    const idx = Math.floor((i / NUM_CP) * track.center.length);
    checkpoints.push(idx);
  }

  // place car on the start line, facing along the track
  const s = track.center[0];
  const a = Math.atan2(track.center[1].y - s.y, track.center[1].x - s.x);
  car = new Car();
  car.reset(s.x, s.y, a);

  cam.x = car.x; cam.y = car.y;
  nextCheckpoint = 1; lap = 0; started = false;
  raceTime = 0; lapStart = 0; lastLap = null; bestLap = null;

  // HUD
  document.getElementById('biome').textContent = biomeName;
  document.getElementById('seedval').textContent = currentSeed;
  document.getElementById('lap').textContent = `0 / ${TOTAL_LAPS}`;
  document.getElementById('last').textContent = '—';
  document.getElementById('best').textContent = '—';
  document.body.style.background = biome.fog;
}

function restartRace() { buildRace(currentSeed); }

// ---------- input ----------
const keys = {};
addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()] = true; if (e.key === ' ') keys[' '] = true;
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; if (e.key === ' ') keys[' '] = false; });

// ---------- touch controls ----------
// Separate flags so touch and keyboard can both feed the same input pipeline.
const touch = { left:false, right:false, gas:false, brake:false, hand:false };
function bindHold(id, prop) {
  const el = document.getElementById(id);
  const on  = e => { e.preventDefault(); touch[prop] = true;  el.classList.add('active'); };
  const off = e => { e.preventDefault(); touch[prop] = false; el.classList.remove('active'); };
  el.addEventListener('pointerdown', e => { el.setPointerCapture(e.pointerId); on(e); });
  el.addEventListener('pointerup', off);
  el.addEventListener('pointercancel', off);
  el.addEventListener('lostpointercapture', off);
}
bindHold('t-left','left'); bindHold('t-right','right');
bindHold('t-gas','gas'); bindHold('t-brake','brake'); bindHold('t-hand','hand');

// Show touch UI on touch-capable devices; also flip on first touch just in case.
if (window.matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window)
  document.body.classList.add('touch');
window.addEventListener('touchstart', () => document.body.classList.add('touch'), { once:true });

document.getElementById('newRace').onclick = () => {
  const v = document.getElementById('seedbox').value.trim();
  buildRace(v ? (/^\d+$/.test(v) ? parseInt(v, 10) : hashStr(v)) : (Math.floor(performance.now()) ^ (Math.random()*1e9|0)));
};
document.getElementById('reset').onclick = restartRace;

// ---------- toast ----------
const toastEl = document.getElementById('toast');
let toastT = 0;
function toast(msg) { toastEl.textContent = msg; toastEl.style.opacity = 1; toastT = 1.4; }

// ---------- is car on the road? ----------
let cachedNearIdx = 0;
function nearestCenterIdx(x, y) {
  // search a window around the last known index for speed
  let best = cachedNearIdx, bestD = Infinity;
  const N = track.center.length;
  for (let k = -25; k <= 25; k++) {
    const i = (cachedNearIdx + k + N) % N;
    const d = dist(x, y, track.center[i].x, track.center[i].y);
    if (d < bestD) { bestD = d; best = i; }
  }
  cachedNearIdx = best;
  return { idx: best, d: bestD };
}

// =============================================================================
//  UPDATE
// =============================================================================
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  dt = Math.min(dt, 0.033);     // clamp big hitches

  // ----- input -> controls -----
  let throttle = 0, steerIn = 0;
  if (keys['w'] || keys['arrowup']    || touch.gas)   throttle += 1;
  if (keys['s'] || keys['arrowdown']  || touch.brake) throttle -= 1;
  if (keys['a'] || keys['arrowleft']  || touch.left)  steerIn -= 1;
  if (keys['d'] || keys['arrowright'] || touch.right) steerIn += 1;
  const handbrake = !!keys[' '] || touch.hand;

  const near = nearestCenterIdx(car.x, car.y);
  const onTrack = near.d < track.width;

  if (started || throttle !== 0) {
    if (!started && throttle > 0) { started = true; lapStart = raceTime; }
    car.update(dt, throttle, steerIn, handbrake, onTrack);
  }
  if (started) raceTime += dt;

  // ----- checkpoint / lap logic -----
  const cpIdx = checkpoints[nextCheckpoint % NUM_CP];
  const cp = track.center[cpIdx];
  if (dist(car.x, car.y, cp.x, cp.y) < track.width + 40) {
    nextCheckpoint++;
    if (nextCheckpoint % NUM_CP === 0) {      // crossed start/finish
      const t = raceTime - lapStart;
      lapStart = raceTime;
      lap++;
      lastLap = t;
      if (bestLap === null || t < bestLap) bestLap = t;
      document.getElementById('last').textContent = t.toFixed(2) + 's';
      document.getElementById('best').textContent = bestLap.toFixed(2) + 's';
      document.getElementById('lap').textContent = `${Math.min(lap, TOTAL_LAPS)} / ${TOTAL_LAPS}`;
      if (lap >= TOTAL_LAPS) { toast('FINISH! ' + raceTime.toFixed(2) + 's'); started = false; }
      else toast('Lap ' + lap + '  ' + t.toFixed(2) + 's');
    }
  }

  // ----- camera: follow car, zoom out a touch with speed, lead the look -----
  const targetZoom = lerp(0.62, 0.46, clamp(car.speed / 720, 0, 1));
  cam.zoom = lerp(cam.zoom, targetZoom, 0.05);
  const leadX = car.x + car.vx * 0.35;
  const leadY = car.y + car.vy * 0.35;
  cam.x = lerp(cam.x, leadX, 0.08);
  cam.y = lerp(cam.y, leadY, 0.08);

  // ----- toast fade -----
  if (toastT > 0) { toastT -= dt; if (toastT <= 0) toastEl.style.opacity = 0; }

  render();
  updateHUD();
  requestAnimationFrame(frame);
}

// =============================================================================
//  RENDER
// =============================================================================
function worldToScreen(x, y) {
  return [ (x - cam.x) * cam.zoom + W / 2, (y - cam.y) * cam.zoom + H / 2 ];
}

function render() {
  // background
  ctx.fillStyle = biome.grass;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);

  // subtle ground texture (two-tone radial bands)
  ctx.fillStyle = biome.grass2;
  for (let gx = -2000; gx < 2000; gx += 260) {
    for (let gy = -2000; gy < 2000; gy += 260) {
      if (((gx + gy) / 260) % 2 === 0) ctx.fillRect(gx, gy, 130, 130);
    }
  }

  drawTrack();
  drawSkids();
  drawProps();
  drawStartLine();
  drawCheckpoint();
  drawCar();

  ctx.restore();

  // vignette
  const g = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
  g.addColorStop(0, 'transparent');
  g.addColorStop(1, biome.fog + 'cc');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  drawMinimap();
}

function strokeCenterline(width, style) {
  ctx.beginPath();
  ctx.moveTo(track.center[0].x, track.center[0].y);
  for (let i = 1; i < track.center.length; i++) ctx.lineTo(track.center[i].x, track.center[i].y);
  ctx.closePath();
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.lineWidth = width; ctx.strokeStyle = style; ctx.stroke();
}

function drawTrack() {
  // outer edge / curb
  strokeCenterline(track.width * 2 + 22, biome.edge);
  // asphalt
  strokeCenterline(track.width * 2, biome.road);
  // dashed centre line
  ctx.beginPath();
  for (let i = 0; i < track.center.length; i += 4) {
    const p = track.center[i];
    ctx.moveTo(p.x, p.y);
    const n = track.center[(i + 2) % track.center.length];
    ctx.lineTo(n.x, n.y);
  }
  ctx.setLineDash([22, 30]);
  ctx.lineWidth = 4; ctx.strokeStyle = '#ffffff55'; ctx.stroke();
  ctx.setLineDash([]);
}

function drawSkids() {
  ctx.lineCap = 'round';
  for (const s of car.skids) {
    ctx.globalAlpha = s.life * 0.5;
    ctx.fillStyle = '#000';
    const cos = Math.cos(s.a), sin = Math.sin(s.a);
    // two rear tire marks
    for (const off of [-9, 9]) {
      const ox = -sin * off, oy = cos * off;
      ctx.fillRect(s.x + ox - 3, s.y + oy - 3, 6, 6);
    }
  }
  ctx.globalAlpha = 1;
}

function drawProps() {
  for (const p of props) {
    const t = biome.prop;
    ctx.save();
    ctx.translate(p.x, p.y);
    // shadow
    ctx.fillStyle = '#0006';
    ctx.beginPath(); ctx.ellipse(4, 6, p.r * 0.9, p.r * 0.5, 0, 0, TAU); ctx.fill();
    if (t === 'cactus') {
      ctx.fillStyle = biome.prop === 'cactus' ? '#4e7c3a' : biome.propColor;
      ctx.fillRect(-p.r*0.25, -p.r, p.r*0.5, p.r*2);
      ctx.fillRect(-p.r*0.7, -p.r*0.3, p.r*0.45, p.r*0.2);
      ctx.fillRect(p.r*0.25, -p.r*0.5, p.r*0.45, p.r*0.2);
    } else if (t === 'pine') {
      ctx.fillStyle = '#6b4a2a'; ctx.fillRect(-3, 0, 6, p.r);
      ctx.fillStyle = biome.propColor;
      ctx.beginPath(); ctx.moveTo(0, -p.r*1.4); ctx.lineTo(p.r, p.r*0.3); ctx.lineTo(-p.r, p.r*0.3); ctx.fill();
      ctx.fillStyle = '#ffffff'; // snow cap
      ctx.beginPath(); ctx.moveTo(0,-p.r*1.4); ctx.lineTo(p.r*0.35,-p.r*0.5); ctx.lineTo(-p.r*0.35,-p.r*0.5); ctx.fill();
    } else { // round tree
      ctx.fillStyle = biome.propColor;
      ctx.beginPath(); ctx.arc(0, 0, p.r, 0, TAU); ctx.fill();
      ctx.fillStyle = biome.accent + '55';
      ctx.beginPath(); ctx.arc(-p.r*0.3, -p.r*0.3, p.r*0.5, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }
}

function drawStartLine() {
  const p = track.center[0];
  const sq = 12;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(Math.atan2(p.ty, p.tx));
  for (let i = -Math.floor(track.width/sq); i < Math.floor(track.width/sq); i++) {
    ctx.fillStyle = (i % 2 === 0) ? '#fff' : '#111';
    ctx.fillRect(-sq, i * sq, sq, sq);
    ctx.fillStyle = (i % 2 === 0) ? '#111' : '#fff';
    ctx.fillRect(0, i * sq, sq, sq);
  }
  ctx.restore();
}

function drawCheckpoint() {
  const cp = track.center[checkpoints[nextCheckpoint % NUM_CP]];
  ctx.save();
  ctx.translate(cp.x, cp.y);
  ctx.rotate(Math.atan2(cp.ty, cp.tx));
  ctx.globalAlpha = 0.35 + 0.25 * Math.sin(raceTime * 6);
  ctx.fillStyle = biome.accent;
  ctx.fillRect(-6, -track.width, 12, track.width * 2);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCar() {
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);
  // shadow
  ctx.fillStyle = '#0007';
  roundRect(-26, -14, 52, 28, 6); ctx.fill();
  // body
  const grd = ctx.createLinearGradient(0, -14, 0, 14);
  grd.addColorStop(0, '#ff5b5b'); grd.addColorStop(1, '#b81e1e');
  ctx.fillStyle = grd;
  roundRect(-28, -15, 56, 30, 7); ctx.fill();
  // windscreen
  ctx.fillStyle = '#0b1620cc';
  roundRect(2, -11, 14, 22, 4); ctx.fill();
  // headlights
  ctx.fillStyle = '#fff6c0';
  ctx.fillRect(26, -11, 4, 6); ctx.fillRect(26, 5, 4, 6);
  // wheels (turn with steering)
  ctx.fillStyle = '#111';
  ctx.fillRect(-22, -19, 12, 6); ctx.fillRect(-22, 13, 12, 6); // rear
  ctx.save(); ctx.translate(16, -16); ctx.rotate(car.steer * 0.5); ctx.fillRect(-6, -3, 12, 6); ctx.restore();
  ctx.save(); ctx.translate(16, 16);  ctx.rotate(car.steer * 0.5); ctx.fillRect(-6, -3, 12, 6); ctx.restore();
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- minimap ----------
function drawMinimap() {
  mctx.clearRect(0, 0, 160, 160);
  // fit track bounds into the minimap
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of track.center) {
    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
  }
  const pad = 16;
  const sc = Math.min((160 - pad*2) / (maxX - minX), (160 - pad*2) / (maxY - minY));
  const ox = pad - minX * sc + (160 - pad*2 - (maxX-minX)*sc) / 2;
  const oy = pad - minY * sc + (160 - pad*2 - (maxY-minY)*sc) / 2;
  const mx = x => x * sc + ox, my = y => y * sc + oy;

  mctx.beginPath();
  mctx.moveTo(mx(track.center[0].x), my(track.center[0].y));
  for (let i = 1; i < track.center.length; i++) mctx.lineTo(mx(track.center[i].x), my(track.center[i].y));
  mctx.closePath();
  mctx.lineWidth = 7; mctx.strokeStyle = '#ffffff22'; mctx.lineJoin = 'round'; mctx.stroke();
  mctx.lineWidth = 3.5; mctx.strokeStyle = biome.accent; mctx.stroke();

  // start line dot
  mctx.fillStyle = '#fff';
  mctx.beginPath(); mctx.arc(mx(track.center[0].x), my(track.center[0].y), 3, 0, TAU); mctx.fill();
  // car
  mctx.fillStyle = '#ff5b5b';
  mctx.beginPath(); mctx.arc(mx(car.x), my(car.y), 4, 0, TAU); mctx.fill();
}

// ---------- HUD ----------
function updateHUD() {
  document.getElementById('time').textContent = raceTime.toFixed(2);
  const kmh = Math.round(car.speed * 0.18);   // arbitrary world->km/h scale
  document.getElementById('kmh').textContent = kmh;
  document.getElementById('gearfill').style.width = clamp(car.speed / 720 * 100, 0, 100) + '%';
}

// ---------- boot ----------
resize();
buildRace(20260616 ^ (Math.random() * 1e9 | 0));
requestAnimationFrame(frame);
</script>
</body>
</html>
